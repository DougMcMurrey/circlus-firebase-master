		<script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
		<script>
			let num = 0;
			mermaid.initialize({
				startOnLoad: false,
				flowchart: {
					useMaxWidth: true
				}
			});

			window.$docsify = {
				name: 'Circlus',
				loadSidebar: true,
				subMaxLevel: 2,
				auto2top: true,
				logo: '/_media/logo.png',
				themeColor: 'coral',
				homepage: 'index.md',
				ga: 'UA-160720726-1',
				markdown: {
					renderer: {
						code: function(code, lang) {
							if (lang === 'mermaid') {
								return '<div class="mermaid">' + mermaid.render('mermaid-svg-' + num++, code) + '</div>';
							}
							return this.origin.code.apply(this, arguments);
						}
